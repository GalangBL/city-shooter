<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0,user-scalable=no"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <title>City Shooter</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #wrapper {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      canvas {
        display: block;
        /* Canvas selalu fit layar penuh, kontrol overlay di atasnya */
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: min(100vw, 200vh);
        height: min(50vw, 100vh);
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      /* Fullscreen */
      :fullscreen canvas,
      :-webkit-full-screen canvas {
        width: 100vw;
        height: 50vw;
        max-height: 100vh;
      }

      /* === Fullscreen Button === */
      #fsbtn {
        position: absolute;
        top: 8px;
        right: 10px;
        background: rgba(255, 136, 0, 0.15);
        border: 1px solid #ff8800;
        color: #ff8800;
        font-family: monospace;
        font-size: 12px;
        padding: 4px 8px;
        cursor: pointer;
        border-radius: 4px;
        z-index: 20;
      }

      #fsbtn:hover {
        background: rgba(255, 136, 0, 0.35);
      }

      /* === Mobile Touch Controls === */
      #controls {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 35vh;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        padding: 0 10px 14px;
        pointer-events: none;
        z-index: 15;
      }

      @media (orientation: landscape) {
        #controls {
          height: 30vh;
        }
      }

      /* Base tombol bulat */
      .cbtn {
        pointer-events: all;
        border-radius: 50%;
        border: 2.5px solid rgba(255, 136, 0, 0.7);
        background: rgba(0, 0, 0, 0.5);
        color: #ff8800;
        font-family: monospace;
        font-weight: bold;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
        text-align: center;
        line-height: 1.15;
        transition:
          background 0.08s,
          transform 0.06s;
      }

      .cbtn:active,
      .cbtn.pressed {
        background: rgba(255, 136, 0, 0.4);
        border-color: #fff;
        transform: scale(0.92);
      }

      /* === KIRI: D-pad === */
      #dpad {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        pointer-events: none;
      }

      #dpad-row {
        display: flex;
        gap: 6px;
        pointer-events: none;
      }

      /* Tombol ← → besar */
      .btn-move {
        width: 70px;
        height: 70px;
        font-size: 26px;
      }

      /* Tombol jongkok pipih di bawah */
      #btn-crouch {
        width: 148px;
        height: 44px;
        border-radius: 22px;
        font-size: 12px;
      }

      /* === KANAN: Action Buttons === */
      #actions {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
        pointer-events: none;
      }

      #actions-top {
        display: flex;
        gap: 6px;
        pointer-events: none;
      }

      /* Tombol kecil: RELOAD, LARI, LOMPAT */
      .btn-sm {
        width: 56px;
        height: 56px;
        font-size: 10px;
      }

      /* Sembunyikan controls di desktop (bukan touch device) */
      @media (hover: hover) and (pointer: fine) {
        #controls {
          display: none !important;
        }
      }

      /* Tombol TEMBAK besar merah */
      #btn-shoot {
        width: 86px;
        height: 86px;
        font-size: 15px;
        background: rgba(160, 0, 0, 0.55);
        border-color: rgba(255, 60, 60, 0.85);
        color: #ff5555;
      }

      #btn-shoot:active,
      #btn-shoot.pressed {
        background: rgba(255, 30, 30, 0.65);
      }
    </style>
  </head>

    <script>
      function toggleFS() {
        const el = document.getElementById("wrapper");
        if (!document.fullscreenElement) {
          el.requestFullscreen && el.requestFullscreen();
        } else {
          document.exitFullscreen && document.exitFullscreen();
        }
      }
      // Update button label on change
      document.addEventListener("fullscreenchange", () => {
        const btn = document.getElementById("fsbtn");
        btn.textContent = document.fullscreenElement ? "✕ Exit" : "⛶ FS";
      });

      // === MOBILE TOUCH CONTROLS ===
      // Dipasang setelah DOM siap; K[] didefinisikan di bawah tapi diakses saat touch
      // Mapping: tombol → array kode keyboard yang disimulasi
      const btnMap = {
        "btn-left": ["ArrowLeft", "KeyA"],
        "btn-right": ["ArrowRight", "KeyD"],
        "btn-crouch": ["ArrowDown", "KeyS"],
        "btn-run": ["ShiftLeft"],
        "btn-jump": ["ArrowUp", "KeyW"],
        "btn-reload": ["KeyR"],
      };

      function wireBtn(id, keys, onDown, onUp) {
        const el = document.getElementById(id);
        if (!el) return;
        const down = (e) => {
          e.preventDefault();
          el.classList.add("pressed");
          if (onDown) onDown();
          else
            keys.forEach((k) => {
              if (typeof K !== "undefined") K[k] = true;
            });
        };
        const up = (e) => {
          e.preventDefault();
          el.classList.remove("pressed");
          if (onUp) onUp();
          else
            keys.forEach((k) => {
              if (typeof K !== "undefined") K[k] = false;
            });
        };
        el.addEventListener("touchstart", down, { passive: false });
        el.addEventListener("touchend", up, { passive: false });
        el.addEventListener("touchcancel", up, { passive: false });
        el.addEventListener("mousedown", down);
        el.addEventListener("mouseup", up);
        el.addEventListener("mouseleave", up);
      }

      // Pasang semua tombol biasa
      Object.entries(btnMap).forEach(([id, keys]) => wireBtn(id, keys));

      // Tombol TEMBAK: trigger shoot() sekali per tap + hold untuk rapid fire
      let shootInterval = null;
      wireBtn(
        "btn-shoot",
        [],
        () => {
          if (typeof shoot === "function") shoot();
          shootInterval = setInterval(() => {
            if (typeof shoot === "function") shoot();
          }, 120);
        },
        () => {
          clearInterval(shootInterval);
          shootInterval = null;
        },
      );

      // Jika menu masih tampil, tap sembarang tombol kontrol akan mulai game
      document.getElementById("controls").addEventListener(
        "touchstart",
        () => {
          if (typeof gamePhase !== "undefined" && gamePhase === "menu") {
            if (typeof startGame === "function") startGame();
          }
        },
        { passive: true },
      );

      // Tap canvas: handle semua phase game (menu, levelComplete, gameover, win)
      function handleCanvasTap() {
        if (typeof gamePhase === "undefined") return;
        if (gamePhase === "menu") {
          if (typeof startGame === "function") startGame();
        } else if (gamePhase === "levelComplete") {
          if (typeof currentLevel !== "undefined" && currentLevel < 3) {
            // Lanjut ke level berikutnya
            transitionNextLevel = currentLevel + 1;
            gamePhase = "transition";
            transitionTimer = 0;
          } else if (typeof currentLevel !== "undefined" && currentLevel >= 3) {
            gamePhase = "win";
          }
        } else if (gamePhase === "gameover") {
          if (typeof resetLevel === "function") resetLevel(currentLevel);
        } else if (gamePhase === "win") {
          currentLevel = 1;
          if (typeof startGame === "function") startGame();
        }
      }
      document
        .getElementById("c")
        .addEventListener("touchstart", handleCanvasTap, { passive: true });
      document.getElementById("c").addEventListener("click", handleCanvasTap);

      // === GAME STATE ===

      // === PLAYER ===

      // === PARALLAX ===

      // === PARTICLES ===
      let particles = [];
      function spawnBlood(x, y) {
        for (let i = 0; i < 25; i++) {
          particles.push({
            x,
            y,
            vx: (Math.random() - 0.5) * 350,
            vy: -(Math.random() * 250 + 50),

      // === BULLETS ===
      let bullets = [];
      let enemyBullets = [];

      function shoot() {
        if (P.dead || P.reloading) return;
        if (P.ammo <= 0) {
          startReload();
          return;
        }
        const bx = P.fc > 0 ? P.x + P.w : P.x;
        const by = P.crouching ? P.y + P.h * 0.4 : P.y + P.h * 0.35;
        bullets.push({ x: bx, y: by, vx: P.fc * 600, life: 1.5 });
        P.ammo--;
        P.shooting = true;
        P.shootTimer = 0;
        P.shootFr = 0;
      }

      function startReload() {
        if (P.reloading || P.dead) return;
        P.reloading = true;
        P.reloadTimer = 0;
        P.shooting = false;
      }

      // === ENEMIES ===
      let enemies = [];
      let score = 0;
      let spawnTimer = 0;
      let totalSpawned = 0;

      function spawnEnemy() {
        const cfg = LEVEL_CFG[currentLevel];
        const spd =
          cfg.enemySpd[0] + Math.random() * (cfg.enemySpd[1] - cfg.enemySpd[0]);
        const aimT =
          cfg.aimTime[0] + Math.random() * (cfg.aimTime[1] - cfg.aimTime[0]);
        // Boss level 3 lebih besar
        const isBoss = !!cfg.isBoss;
        const eW = isBoss ? 130 : 70;
        const eH = isBoss ? 160 : 90;
        enemies.push({
          x: P.x + 500 + Math.random() * 200,
          y: P.FL - eH,
          w: eW,
          h: eH,
          hp: cfg.enemyHp,
          fc: -1,
          spd,
          state: "walk",
          timer: 0,
          walkFr: 0,
          walkFt: 0,
          crouching: false,
          aimTime: aimT,
          fireTime: isBoss ? 0.15 : 0.3, // boss tembak lebih sering
          dead: false,
          deadTimer: 0,
          isBoss,
        });
      }

      function updateEnemies(dt) {
        const cfg = LEVEL_CFG[currentLevel];
        const maxScore = cfg.maxEnemies * 10;

        if (score >= maxScore) {
          enemies = [];
          enemyBullets = [];
          if (gamePhase === "playing") {
            gamePhase = "levelComplete";
            levelCompleteTimer = 0;
          }
          return;
        }

        spawnTimer += dt;
        if (
          spawnTimer >= cfg.spawnInterval &&
          enemies.length < cfg.maxOnScreen &&
          totalSpawned < cfg.maxEnemies
        ) {
          spawnTimer = 0;
          spawnEnemy();
          totalSpawned++;
        }

        enemies.forEach((e) => {
          if (e.dead) {
            e.deadTimer += dt;
            return;
          }
          e.fc = P.x < e.x ? -1 : 1;
          const dist = Math.abs(P.x - e.x);

          if (e.state === "walk") {
            e.x += e.fc * e.spd * dt;
            e.walkFt += dt;
            if (e.walkFt >= 0.15) {
              e.walkFt = 0;
              e.walkFr = (e.walkFr + 1) % cfg.musuhJln.length;
            }
            if (dist < 400) {
              e.state = "aim";
              e.timer = 0;
            }
          } else if (e.state === "aim") {
            e.timer += dt;
            if (dist > 500) {
              e.state = "walk";
              e.timer = 0;
              return;
            }
            if (e.timer >= e.aimTime) {
              e.state = "fire";
              e.timer = 0;
              e.crouching = P.crouching;
              const bx = e.fc > 0 ? e.x + e.w : e.x;
              const standingChestY = P.FL - 100 * 0.45;
              const by = e.crouching ? e.y + e.h * 0.6 : standingChestY;

              if (e.isBoss) {
                // Boss: tembak 3 peluru sekaligus - lurus, sedikit atas, sedikit bawah
                const speeds = [
                  cfg.enemyBulletSpd,
                  cfg.enemyBulletSpd * 0.85,
                  cfg.enemyBulletSpd * 0.85,
                ];
                const offsets = [0, -25, 25];
                speeds.forEach((spd, i) => {
                  enemyBullets.push({
                    x: bx,
                    y: by + offsets[i],
                    vx: e.fc * spd,
                    life: 2.5,
                  });
                });
              } else {
                enemyBullets.push({
                  x: bx,
                  y: by,
                  vx: e.fc * cfg.enemyBulletSpd,
                  crouching: e.crouching,
                  life: 2,
                });
              }
            }
          } else if (e.state === "fire") {
            e.timer += dt;
            // Boss: tembak terus selama state fire (burst)
            if (e.isBoss && e.timer >= e.fireTime) {
              e.timer = 0;
              if (dist <= 500) {
                const bx = e.fc > 0 ? e.x + e.w : e.x;
                const by = P.FL - 100 * 0.45;
                const offsets = [0, -30, 30];
                offsets.forEach((off) => {
                  enemyBullets.push({
                    x: bx,
                    y: by + off,
                    vx: e.fc * cfg.enemyBulletSpd,
                    life: 2.5,
                  });
                });
              } else {
                e.state = "walk";
                e.timer = 0;
                e.crouching = false;
              }
              // Boss kembali aim setelah burst 3x
              if (!e.burstCount) e.burstCount = 0;
              e.burstCount++;
              if (e.burstCount >= 3) {
                e.burstCount = 0;
                e.state = "aim";
                e.timer = 0;
                e.aimTime =
                  cfg.aimTime[0] +
                  Math.random() * (cfg.aimTime[1] - cfg.aimTime[0]);
              }
            } else if (!e.isBoss && e.timer >= e.fireTime) {
              e.state = dist > 500 ? "walk" : "aim";
              e.timer = 0;
              e.crouching = false;
              e.aimTime =
                cfg.aimTime[0] +
                Math.random() * (cfg.aimTime[1] - cfg.aimTime[0]);
            }
          }
        });

        enemies = enemies.filter((e) => !e.dead || e.deadTimer < 2);

        enemyBullets = enemyBullets.filter((b) => {
          b.x += b.vx * dt;
          b.life -= dt;
          return b.life > 0 && b.x > cameraX - 100 && b.x < cameraX + 900;
        });

        bullets.forEach((b) => {
          enemies.forEach((e) => {
            if (e.dead) return;
            if (b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
              e.hp--;
              b.life = 0;
              spawnBlood(e.x + e.w / 2, e.y + e.h / 2);
              if (e.hp <= 0) {
                e.dead = true;
                e.deadTimer = 0;
                score += 10;
              }
            }
          });
        });

        if (!P.dead) {
          enemyBullets.forEach((b) => {
            // Hitbox player: P.x, P.y, P.w, P.h (P.h=70 saat jongkok, 100 saat berdiri)
            if (b.x > P.x && b.x < P.x + P.w && b.y > P.y && b.y < P.y + P.h) {
              P.hp--;
              b.life = 0;
              P.hitFlash = 0.35; // aktifkan hit flash
              spawnBlood(P.x + P.w / 2, P.y + P.h / 2);
              if (P.hp <= 0) {
                P.dead = true;
                P.deathTimer = 0;
              }
            }
          });
        }
      }

      // === INPUT ===
      const K = {};
      window.addEventListener("keydown", (e) => {
        K[e.code] = true;
        // Jangan preventDefault untuk F agar tidak block shortcut lain
        if (e.code !== "KeyF") e.preventDefault();

        // Toggle fullscreen dengan F
        if (e.code === "KeyF") {
          toggleFS();
          return;
        }

        // Saat transisi: abaikan semua input
        if (gamePhase === "transition") return;

        // Menu: tekan apa saja untuk mulai
        if (gamePhase === "menu") {
          startGame();
          return;
        }

        // Game Over: tekan R untuk retry dari level yang sama
        if (gamePhase === "gameover") {
          if (e.code === "KeyR") resetLevel(currentLevel);
          return;
        }

        // Win screen: tekan R untuk main lagi dari awal
        if (gamePhase === "win") {
          if (e.code === "KeyR") {
            currentLevel = 1;
            startGame();
          }
          return;
        }

        if (e.code === "KeyR") {
          if (P.dead) {
            resetLevel(currentLevel);
          } else if (gamePhase === "levelComplete" && currentLevel >= 3) {
            if (score > highScore) {
              highScore = score;
              localStorage.setItem("cs_highscore", highScore);
            }
            gamePhase = "win";
          } else {
            startReload();
          }
        }
        if (e.code === "Space") shoot();
        if (
          (e.code === "Enter" || e.code === "KeyN") &&
          gamePhase === "levelComplete" &&
          currentLevel < 3
        ) {
          // Mulai layar transisi ke level berikutnya
          transitionNextLevel = currentLevel + 1;
          gamePhase = "transition";
          transitionTimer = 0;
        }
      });
      window.addEventListener("keyup", (e) => (K[e.code] = false));

      function startGame() {
        // Minta fullscreen otomatis saat mulai main
        const el = document.getElementById("wrapper");
        if (!document.fullscreenElement && el.requestFullscreen) {
          el.requestFullscreen().catch(() => {});
        }
        resetLevel(currentLevel);
      }

      function resetLevel(lvl) {
        currentLevel = lvl;
        gamePhase = "playing";
        levelCompleteTimer = 0;
        score = 0;
        spawnTimer = 0;
        totalSpawned = 0;
        enemies = [];
        enemyBullets = [];
        bullets = [];
        particles = [];
        levelTimer = 0;
        resetPlayer();
        cameraX = 0;
      }

      // === UPDATE ===
      let lt = 0;
      function upd(dt) {
        menuPulse += dt * 2;

        if (
          gamePhase === "menu" ||
          gamePhase === "win" ||
          gamePhase === "gameover"
        )
          return;

        if (gamePhase === "levelComplete") {
          levelCompleteTimer += dt;
          return;
        }

        // Layar transisi antar level
        if (gamePhase === "transition") {
          transitionTimer += dt;
          if (transitionTimer >= 2.5) {
            currentLevel = transitionNextLevel;
            resetLevel(currentLevel);
          }
          return;
        }

        if (P.dead) {
          P.deathTimer += dt;
          P.vx = 0;
          // Setelah 2 detik mati, masuk game over screen
          if (P.deathTimer > 2.0) {
            if (score > highScore) {
              highScore = score;
              localStorage.setItem("cs_highscore", highScore);
            }
            gamePhase = "gameover";
          }
          particles = particles.filter((p) => {
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.vy += 400 * dt;
            p.life -= dt * 1.5;
            return p.life > 0;
          });
          updateEnemies(dt);
          return;
        }

        P.vx = 0;
        P.running = K.ShiftLeft || K.ShiftRight;
        const spd = P.running ? P.runSpd : P.spd;

        if (K.ArrowLeft || K.KeyA) {
          P.vx = -spd;
          P.fc = -1;
        }
        if (K.ArrowRight || K.KeyD) {
          P.vx = spd;
          P.fc = 1;
        }

        if ((K.ArrowUp || K.KeyW) && P.gnd && !P.crouching) {
          P.vy = P.jf;
          P.gnd = false;
          P.jumping = true;
        }
        if ((K.ArrowDown || K.KeyS) && P.gnd) {
          if (!P.crouching) {
            P.crouching = true;
            P.h = 70; // proporsional dengan asset jongkok (content ~310x338, ratio ~1:1)
            P.y = P.FL - P.h;
          }
        } else if (!(K.ArrowDown || K.KeyS) && P.crouching) {
          P.crouching = false;
          P.h = 100;
          P.y = P.FL - P.h;
        }

        P.vy += 1200 * dt;
        P.x += P.vx * dt;
        P.y += P.vy * dt;

        if (P.y >= P.FL - P.h) {
          P.y = P.FL - P.h;
          P.vy = 0;
          P.gnd = true;
          P.jumping = false;
        }
        P.x = Math.max(0, Math.min(WORLD_WIDTH - P.w, P.x));

        cameraX = P.x - 350;
        cameraX = Math.max(0, Math.min(WORLD_WIDTH - 800, cameraX));

        particles = particles.filter((p) => {
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vy += 400 * dt;
          p.life -= dt * 1.5;
          return p.life > 0;
        });

        bullets = bullets.filter((b) => {
          b.x += b.vx * dt;
          b.life -= dt;
          return b.life > 0 && b.x > cameraX - 100 && b.x < cameraX + 900;
        });

        if (P.shooting) {
          P.shootTimer += dt;
          if (P.shootTimer >= 0.07) {
            P.shootTimer = 0;
            P.shootFr++;
            if (P.shootFr >= 3) {
              P.shooting = false;
              P.shootFr = 0;
            }
          }
        }

        if (P.reloading) {
          P.reloadTimer += dt;
          if (P.reloadTimer >= 0.8) {
            P.reloading = false;
            P.reloadTimer = 0;
            P.ammo = P.maxAmmo;
          }
        }

        const curFps = P.running ? 16 : P.fps;
        if (Math.abs(P.vx) > 10 || P.jumping || P.crouching) {
          P.ft += dt;
          if (P.ft >= 1 / curFps) {
            P.ft = 0;
            P.fr = (P.fr + 1) % 4;
          }
        } else {
          P.fr = 0;
          P.ft = 0;
        }

        // Update hit flash timer
        if (P.hitFlash > 0) P.hitFlash -= dt;

        // Countdown timer
        if (!P.dead) {
          levelTimer += dt;
          const tLimit = LEVEL_CFG[currentLevel].timeLimit;
          if (levelTimer >= tLimit) {
            P.dead = true;
            P.deathTimer = 99; // langsung game over
            gamePhase = "gameover";
          }
        }

        updateEnemies(dt);
      }

      // === DRAW ===
      function drw() {
        X.clearRect(0, 0, 800, 400);
        const cfg = LEVEL_CFG[currentLevel];

        // === LEVEL TRANSITION SCREEN ===
        if (gamePhase === "transition") {
          // Fase: 0-0.6 = fade in gelap, 0.6-1.8 = tampil text, 1.8-2.5 = fade out
          const t = transitionTimer;
          const nextCfg = LEVEL_CFG[transitionNextLevel];

          // Gambar background level berikutnya
          const bgImg = IMGS[nextCfg.bg];
          if (bgImg) {
            X.globalAlpha = 1;
            X.drawImage(bgImg, 0, 0, 800, 400);
          }

          // Overlay gelap dengan fade
          let alpha;
          if (t < 0.6)
            alpha = t / 0.6; // fade in
          else if (t < 1.8)
            alpha = 1.0; // penuh gelap
          else alpha = 1.0 - (t - 1.8) / 0.7; // fade out
          alpha = Math.max(0, Math.min(1, alpha)) * 0.88;
          X.globalAlpha = alpha;
          X.fillStyle = "#000000";
          X.fillRect(0, 0, 800, 400);
          X.globalAlpha = 1;

          // Teks hanya saat pertengahan
          if (t >= 0.5 && t <= 2.2) {
            const textAlpha =
              t < 0.8 ? (t - 0.5) / 0.3 : t > 1.9 ? (2.2 - t) / 0.3 : 1.0;
            X.globalAlpha = Math.max(0, Math.min(1, textAlpha));
            X.textAlign = "center";

            // Label level
            X.shadowColor = "#ff8800";
            X.shadowBlur = 30;
            X.fillStyle = "#ff8800";
            X.font = "bold 22px monospace";
            X.fillText("STAGE", 400, 165);
            X.shadowBlur = 0;

            // Nomor level besar
            X.shadowColor = "#ffffff";
            X.shadowBlur = 25;
            X.fillStyle = "#ffffff";
            X.font = "bold 90px monospace";
            X.fillText(transitionNextLevel, 400, 255);
            X.shadowBlur = 0;

            // Garis dekorasi
            X.strokeStyle = "#ff8800";
            X.lineWidth = 2;
            X.beginPath();
            X.moveTo(200, 280);
            X.lineTo(600, 280);
            X.stroke();

            X.fillStyle = "#aaaaaa";
            X.font = "16px monospace";
            const labels = [
              "",
              "Urban Assault",
              "Industrial Zone",
              "Final Showdown",
            ];
            X.fillText(labels[transitionNextLevel] || "", 400, 308);
            X.globalAlpha = 1;
            X.textAlign = "left";
          }
          return;
        }

        // === MAIN MENU ===
        if (gamePhase === "menu") {
          // Background menu pakai bg1
          const bgImg = IMGS["bg1"];
          if (bgImg) {
            X.drawImage(bgImg, 0, 0, 800, 400);
          } else {
            X.fillStyle = "#0a0a1a";
            X.fillRect(0, 0, 800, 400);
          }
          X.fillStyle = "rgba(0,0,0,0.55)";
          X.fillRect(0, 0, 800, 400);

          // Title
          X.shadowColor = "#ff4400";
          X.shadowBlur = 30;
          X.fillStyle = "#ff8800";
          X.font = "900 62px 'Orbitron', monospace";
          X.textAlign = "center";
          X.fillText("CITY SHOOTER", 400, 138);
          X.shadowBlur = 0;

          X.fillStyle = "#ffdd00";
          X.font = "bold 14px 'Orbitron', monospace";
          X.fillText("3 STAGE  •  FINAL BOSS  •  SIDE SCROLLER", 400, 172);

          // Tombol play (pulsing)
          const pulse = 0.85 + Math.sin(menuPulse) * 0.15;
          X.save();
          X.translate(400, 260);
          X.scale(pulse, pulse);
          X.fillStyle = "#ff8800";
          X.fillRect(-110, -28, 220, 56);
          X.strokeStyle = "#fff";
          X.lineWidth = 2;
          X.strokeRect(-110, -28, 220, 56);
          X.fillStyle = "#000";
          X.font = "bold 24px monospace";
          X.fillText("▶  MULAI", 0, 10);
          X.restore();

          X.fillStyle = "#aaaaaa";
          X.font = "14px monospace";
          X.fillText("Tekan sembarang tombol untuk mulai", 400, 330);

          // High Score
          if (highScore > 0) {
            X.fillStyle = "#ffdd00";
            X.font = "bold 13px monospace";
            X.fillText("🏆 BEST SCORE: " + highScore, 400, 355);
          }

          // Controls
          X.fillStyle = "#666";
          X.font = "12px monospace";
          X.fillText(
            "A/D=gerak  SHIFT=lari  W=loncat  S=jongkok  SPACE=tembak  R=reload",
            400,
            370,
          );
          X.textAlign = "left";
          return;
        }

        // === GAME OVER SCREEN ===
        if (gamePhase === "gameover") {
          X.fillStyle = "#0a0008";
          X.fillRect(0, 0, 800, 400);
          X.shadowColor = "#ff0000";
          X.shadowBlur = 40;
          X.fillStyle = "#ff2222";
          X.font = "900 68px 'Orbitron', monospace";
          X.textAlign = "center";
          X.fillText("GAME OVER", 400, 162);
          X.shadowBlur = 0;
          X.fillStyle = "#ffffff";
          X.font = "22px monospace";
          X.fillText(
            "Level " + currentLevel + "  |  Score: " + score,
            400,
            215,
          );
          const pulse = 0.9 + Math.sin(menuPulse) * 0.1;
          X.save();
          X.translate(400, 285);
          X.scale(pulse, pulse);
          X.fillStyle = "#cc2222";
          X.fillRect(-100, -24, 200, 48);
          X.strokeStyle = "#ff8888";
          X.lineWidth = 2;
          X.strokeRect(-100, -24, 200, 48);
          X.fillStyle = "#fff";
          X.font = "bold 20px monospace";
          X.fillText("TAP / R  ▶  COBA LAGI", 0, 8);
          X.restore();
          // High score di game over
          if (highScore > 0) {
            X.fillStyle = "#ffdd00";
            X.font = "bold 13px monospace";
            X.textAlign = "center";
            X.fillText("🏆 BEST: " + highScore, 400, 335);
          }
          X.textAlign = "left";
          return;
        }

        // === WIN SCREEN ===
        if (gamePhase === "win") {
          X.fillStyle = "#000a05";
          X.fillRect(0, 0, 800, 400);
          X.shadowColor = "#00ff88";
          X.shadowBlur = 40;
          X.fillStyle = "#00ff88";
          X.font = "900 44px 'Orbitron', monospace";
          X.textAlign = "center";
          X.fillText("MISSION COMPLETE!", 400, 128);
          X.shadowBlur = 0;
          X.fillStyle = "#ffdd00";
          X.font = "bold 28px monospace";
          X.fillText("BOSS DEFEATED!", 400, 185);
          X.fillStyle = "#ffffff";
          X.font = "22px monospace";
          X.fillText("Final Score: " + score, 400, 230);
          const pulse = 0.9 + Math.sin(menuPulse) * 0.1;
          X.save();
          X.translate(400, 295);
          X.scale(pulse, pulse);
          X.fillStyle = "#006633";
          X.fillRect(-110, -24, 220, 48);
          X.strokeStyle = "#00ff88";
          X.lineWidth = 2;
          X.strokeRect(-110, -24, 220, 48);
          X.fillStyle = "#fff";
          X.font = "bold 20px monospace";
          X.fillText("TAP / R  ▶  MAIN LAGI", 0, 8);
          X.restore();
          X.textAlign = "left";
          return;
        }

        // Background
        const bgImg = IMGS[cfg.bg];
        if (bgImg) {
          const bgW = 800;
          const offsetBg = -(cameraX * 0.3) % bgW;
          X.drawImage(bgImg, offsetBg, 0, bgW, 400);
          X.drawImage(bgImg, offsetBg + bgW, 0, bgW, 400);
          X.drawImage(bgImg, offsetBg - bgW, 0, bgW, 400);
        } else {
          const g = X.createLinearGradient(0, 0, 0, 400);
          g.addColorStop(0, "#050510");
          g.addColorStop(1, "#0a0a20");
          X.fillStyle = g;
          X.fillRect(0, 0, 800, 400);
        }

        X.fillStyle = "#1a1a2a";
        X.fillRect(0, P.FL, 800, 400 - P.FL);
        X.fillStyle = "#2a2a3a";
        X.fillRect(0, P.FL, 800, 3);

        particles.forEach((p) => {
          X.globalAlpha = p.life;
          X.fillStyle = p.col;
          X.fillRect(p.x - cameraX - p.sz / 2, p.y - p.sz / 2, p.sz, p.sz);
        });
        X.globalAlpha = 1;

        drawCharacter(cfg);

        enemies.forEach((e) => {
          let img;
          if (e.dead) {
            X.globalAlpha = Math.max(0, 1 - e.deadTimer);
            img = IMGS[cfg.musuhFire];
          } else if (e.state === "fire") {
            img = e.crouching
              ? IMGS[cfg.musuhJongkokFire]
              : IMGS[cfg.musuhFire];
          } else if (e.state === "aim") {
            img = e.crouching ? IMGS[cfg.musuhJongkokAim] : IMGS[cfg.musuhAim];
          } else {
            img = IMGS[cfg.musuhJln[e.walkFr % cfg.musuhJln.length]];
          }
          const eRenderW = e.w;
          const eRenderH = e.crouching ? Math.round(e.h * 0.75) : e.h;
          const eRenderY = e.y + (e.h - eRenderH);
          const ex = e.x - cameraX;
          if (img) {
            X.save();
            if (e.fc < 0) {
              X.translate(ex + eRenderW, eRenderY);
              X.scale(-1, 1);
              X.drawImage(img, 0, 0, eRenderW, eRenderH);
            } else {
              X.drawImage(img, ex, eRenderY, eRenderW, eRenderH);
            }
            X.restore();
          } else {
            X.fillStyle = e.isBoss ? "#880000" : "#ff0044";
            X.fillRect(ex, eRenderY, eRenderW, eRenderH);
          }

          // Boss: mini HP bar di atas kepala
          if (e.isBoss && !e.dead) {
            const barW = eRenderW;
            const bossMaxHp = LEVEL_CFG[3].enemyHp;
            const bossHpR = e.hp / bossMaxHp;
            X.fillStyle = "#333";
            X.fillRect(ex, eRenderY - 14, barW, 8);
            X.fillStyle =
              bossHpR > 0.5
                ? "#ff4400"
                : bossHpR > 0.25
                  ? "#ff8800"
                  : "#ff0000";
            X.fillRect(ex, eRenderY - 14, barW * bossHpR, 8);
            X.strokeStyle = "#fff";
            X.strokeRect(ex, eRenderY - 14, barW, 8);
          }
          X.globalAlpha = 1;
        });

        bullets.forEach((b) => {
          X.fillStyle = "#ffcc00";
          X.shadowColor = "#ff8800";
          X.shadowBlur = 6;
          X.fillRect(b.x - cameraX - 8, b.y - 2, 16, 4);
        });
        X.shadowBlur = 0;

        enemyBullets.forEach((b) => {
          X.fillStyle = "#ff3333";
          X.shadowColor = "#ff0000";
          X.shadowBlur = 6;
          X.fillRect(b.x - cameraX - 6, b.y - 2, 12, 4);
        });
        X.shadowBlur = 0;

        // ====== HUD REDESIGN ======
        const hudFont = "'Orbitron', monospace";
        const hudH = 52;

        // Panel HUD atas semi-transparan
        X.fillStyle = "rgba(0,0,0,0.7)";
        X.fillRect(0, 0, 800, hudH);
        X.strokeStyle = "rgba(255,136,0,0.35)";
        X.lineWidth = 1;
        X.beginPath();
        X.moveTo(0, hudH);
        X.lineTo(800, hudH);
        X.stroke();

        // === KIRI: HP BAR ===
        X.fillStyle = "#ff8800";
        X.font = "bold 9px " + hudFont;
        X.fillText("HEALTH", 10, 14);
        const hpR = P.hp / P.maxHp;
        const hpColor =
          hpR > 0.5 ? "#00e060" : hpR > 0.25 ? "#ffaa00" : "#ff2222";
        // Glow saat HP rendah
        if (hpR <= 0.25) {
          X.shadowColor = "#ff0000";
          X.shadowBlur = 8;
        }
        X.fillStyle = "rgba(255,255,255,0.07)";
        X.fillRect(10, 18, 160, 16);
        X.fillStyle = hpColor;
        X.fillRect(10, 18, 160 * hpR, 16);
        // Segmen HP bar
        for (let s = 1; s < P.maxHp; s++) {
          X.fillStyle = "rgba(0,0,0,0.4)";
          X.fillRect(10 + (160 / P.maxHp) * s - 0.5, 18, 1, 16);
        }
        X.strokeStyle = "rgba(255,255,255,0.25)";
        X.lineWidth = 1;
        X.strokeRect(10, 18, 160, 16);
        X.shadowBlur = 0;
        X.fillStyle = "#fff";
        X.font = "bold 9px " + hudFont;
        X.fillText(P.hp + " / " + P.maxHp, 14, 30);

        // === TENGAH: STAGE + TIMER + SCORE ===
        X.textAlign = "center";
        // Stage badge
        X.fillStyle = "rgba(255,136,0,0.15)";
        X.strokeStyle = "#ff8800";
        X.lineWidth = 1;
        X.fillRect(320, 4, 80, 16);
        X.strokeRect(320, 4, 80, 16);
        X.fillStyle = "#ff8800";
        X.font = "bold 9px " + hudFont;
        X.fillText("STAGE  " + currentLevel, 360, 16);

        // Timer countdown - BESAR
        const tLeft = Math.max(
          0,
          LEVEL_CFG[currentLevel].timeLimit - levelTimer,
        );
        const tMin = Math.floor(tLeft / 60);
        const tSec = Math.floor(tLeft % 60);
        const tStr = tMin + ":" + String(tSec).padStart(2, "0");
        const isUrgent = tLeft < 20;
        if (isUrgent) {
          X.shadowColor = "#ff0000";
          X.shadowBlur = 14;
          X.fillStyle =
            Math.floor(Date.now() / 250) % 2 === 0 ? "#ff3333" : "#ff9999";
        } else if (tLeft < 40) {
          X.fillStyle = "#ffaa00";
        } else {
          X.fillStyle = "#ffffff";
        }
        X.font = "900 26px " + hudFont;
        X.fillText(tStr, 400, 44);
        X.shadowBlur = 0;

        // Ikon jam kecil
        X.fillStyle = isUrgent ? "#ff4444" : "#aaa";
        X.font = "12px monospace";
        X.fillText("⏱", 375, 44);

        // Score
        X.textAlign = "right";
        X.fillStyle = "#888";
        X.font = "bold 9px " + hudFont;
        X.fillText("SCORE", 790, 14);
        X.fillStyle = "#ffdd00";
        X.font = "bold 18px " + hudFont;
        X.fillText(score, 790, 34);

        // === KANAN: AMMO ICONS ===
        X.textAlign = "left";
        X.fillStyle = "#888";
        X.font = "bold 9px " + hudFont;
        const ammoLabelX = 615;
        X.fillText("AMMO", ammoLabelX, 14);
        for (let i = 0; i < P.maxAmmo; i++) {
          const bx = ammoLabelX + i * 19;
          const filled = i < P.ammo;
          if (P.reloading) {
            // Efek reload: isi dari kiri berdasarkan timer
            const reloadFull = P.reloadTimer / 0.8;
            const fillPct = Math.min(1, reloadFull * P.maxAmmo - i);
            X.fillStyle =
              fillPct > 0
                ? "rgba(255,220,0," + Math.min(1, fillPct) + ")"
                : "rgba(255,255,255,0.12)";
          } else {
            X.fillStyle = filled ? "#ffdd00" : "rgba(255,255,255,0.12)";
          }
          // Gambar peluru (lonjong) - pakai rect biasa untuk kompatibilitas
          X.beginPath();
          X.rect(bx, 18, 13, 24);
          X.fill();
          // Highlight
          if (filled && !P.reloading) {
            X.fillStyle = "rgba(255,255,255,0.25)";
            X.fillRect(bx + 2, 20, 3, 9);
          }
        }
        if (P.reloading) {
          X.fillStyle = "#ff8800";
          X.font = "bold 9px " + hudFont;
          X.fillText("RELOADING...", ammoLabelX, 50);
        }

        // === BOSS HP BAR (Level 3) ===
        if (currentLevel === 3 && enemies.length > 0 && !enemies[0].dead) {
          const boss = enemies[0];
          const bossMaxHp = LEVEL_CFG[3].enemyHp;
          const bossHpR = boss.hp / bossMaxHp;
          X.textAlign = "center";
          // Panel
          X.fillStyle = "rgba(0,0,0,0.7)";
          X.fillRect(140, hudH + 4, 520, 24);
          X.strokeStyle = "#ff4400";
          X.lineWidth = 1;
          X.strokeRect(140, hudH + 4, 520, 24);
          // Bar
          const bc =
            bossHpR > 0.5 ? "#ff4400" : bossHpR > 0.25 ? "#ff8800" : "#ff0000";
          X.fillStyle = bc;
          X.fillRect(142, hudH + 6, 516 * bossHpR, 20);
          X.fillStyle = "#fff";
          X.font = "bold 10px " + hudFont;
          X.fillText(
            "⚠ BOSS  " + boss.hp + " / " + bossMaxHp + "  ⚠",
            400,
            hudH + 20,
          );
          X.textAlign = "left";
        }

        // === BOTTOM: Kill counter (Level 1 & 2) ===
        if (currentLevel < 3) {
          const killed = Math.floor(score / 10);
          const total = cfg.maxEnemies;
          const remaining = Math.max(0, total - killed);
          X.fillStyle = "rgba(0,0,0,0.6)";
          X.fillRect(0, 374, 190, 26);
          X.fillStyle = remaining > 0 ? "#ff8800" : "#00e060";
          X.font = "bold 10px " + hudFont;
          X.fillText("☠ MUSUH: " + remaining + " / " + total, 10, 390);
          // Kill progress bar
          X.fillStyle = "rgba(255,255,255,0.08)";
          X.fillRect(10, 394, 150, 4);
          X.fillStyle = "#ff4400";
          X.fillRect(10, 394, 150 * (killed / total), 4);
        }

        // Level Complete overlay
        if (gamePhase === "levelComplete") {
          X.fillStyle = "rgba(0,0,0,0.7)";
          X.fillRect(0, 0, 800, 400);
          X.textAlign = "center";
          X.fillStyle = currentLevel === 3 ? "#ffdd00" : "#00ff88";
          X.shadowColor = currentLevel === 3 ? "#ffdd00" : "#00ff88";
          X.shadowBlur = 20;
          X.font = "bold 40px monospace";
          X.fillText(cfg.label, 400, 155);
          X.shadowBlur = 0;
          X.fillStyle = "#fff";
          X.font = "22px monospace";
          X.fillText("Score: " + score, 400, 205);
          const pulse = 0.9 + Math.sin(menuPulse) * 0.1;
          X.save();
          X.translate(400, 275);
          X.scale(pulse, pulse);
          X.fillStyle = currentLevel < 3 ? "#226600" : "#664400";
          X.fillRect(-140, -24, 280, 48);
          X.strokeStyle = currentLevel < 3 ? "#00ff88" : "#ffdd00";
          X.lineWidth = 2;
          X.strokeRect(-140, -24, 280, 48);
          X.fillStyle = "#fff";
          X.font = "bold 18px monospace";
          const nextTxt =
            currentLevel < 3
              ? "ENTER / TAP  ▶  Level " + (currentLevel + 1)
              : "TAP / R  ▶  MAIN LAGI";
          X.fillText(nextTxt, 0, 8);
          X.restore();
          X.textAlign = "left";
        }
      }

      function drawCharacter(cfg) {
        const sx = P.x - cameraX;
        if (P.dead) {
          const img = IMGS[cfg.mati];
          if (img) {
            X.save();
            // Lebar dead = tinggi walk (P.h=100px), tinggi dead = lebar walk (P.w=80px)
            const renderW = P.h; // 100px lebar
            const renderH = P.w; // 80px tinggi
            const drawY = P.FL - renderH;
            if (P.fc < 0) {
              X.translate(sx + renderW, drawY);
              X.scale(-1, 1);
              X.drawImage(img, 0, 0, renderW, renderH);
            } else {
              X.drawImage(img, sx, drawY, renderW, renderH);
            }
            X.restore();
          }
          return;
        }

        let img;
        // Semua animasi dirender dengan ukuran sama persis seperti walk (P.w x P.h)
        if (P.reloading) {
          img = P.crouching ? IMGS[cfg.nembakjongkok4] : IMGS[cfg.nembak4];
        } else if (P.shooting && P.crouching) {
          img =
            IMGS[
              cfg.nembakjongkok[
                Math.min(P.shootFr, cfg.nembakjongkok.length - 1)
              ]
            ];
        } else if (P.shooting) {
          img = IMGS[cfg.nembak[Math.min(P.shootFr, cfg.nembak.length - 1)]];
        } else if (P.jumping) {
          img = IMGS[cfg.loncat[Math.min(P.fr, cfg.loncat.length - 1)]];
        } else if (P.crouching) {
          img = IMGS[cfg.jongkok[Math.min(P.fr, cfg.jongkok.length - 1)]];
        } else if (P.running && Math.abs(P.vx) > 10) {
          img = IMGS[cfg.lari[Math.min(P.fr, cfg.lari.length - 1)]];
        } else {
          img = IMGS[cfg.jln[Math.min(P.fr, cfg.jln.length - 1)]];
        }

        // Fallback: kalau img belum load, pakai frame walk pertama
        if (!img) img = IMGS[cfg.jln[0]];

        if (img) {
          X.save();
          if (P.fc < 0) {
            X.translate(sx + P.w, P.y);
            X.scale(-1, 1);
            X.drawImage(img, 0, 0, P.w, P.h);
          } else {
            X.drawImage(img, sx, P.y, P.w, P.h);
          }
          X.restore();
        }

        // Hit flash overlay (merah transparan di atas karakter)
        if (P.hitFlash > 0) {
          const flashAlpha = (P.hitFlash / 0.35) * 0.55;
          X.save();
          X.globalAlpha = flashAlpha;
          X.fillStyle = "#ff0000";
          X.fillRect(sx, P.y, P.w, P.h);
          X.restore();

          // Efek layar: vignette merah tipis di tepi layar
          const vAlpha = (P.hitFlash / 0.35) * 0.3;
          X.save();
          X.globalAlpha = vAlpha;
          const vg = X.createRadialGradient(400, 200, 150, 400, 200, 420);
          vg.addColorStop(0, "rgba(255,0,0,0)");
          vg.addColorStop(1, "rgba(255,0,0,0.9)");
          X.fillStyle = vg;
          X.fillRect(0, 0, 800, 400);
          X.restore();
        }
      }

      // === GAME LOOP ===
      function loop(ts) {
        const dt = Math.min((ts - lt) / 1000, 0.05);
        lt = ts;
        upd(dt);
        drw();
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
