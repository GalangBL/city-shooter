<!doctype html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
    <title>City Shooter – Goodbye</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #060610;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', monospace;
            color: #fff;
            overflow: hidden;
        }

        .title {
            font-size: 48px;
            font-weight: 900;
            color: #ff8800;
            text-shadow: 0 0 40px #ff4400, 0 0 80px #ff2200;
            margin-bottom: 20px;
            animation: pulse 2s infinite alternate;
        }

        .subtitle {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 48px;
            letter-spacing: 2px;
        }

        .back-btn {
            padding: 14px 40px;
            border: 2px solid #ff8800;
            background: rgba(255, 136, 0, 0.12);
            color: #ff8800;
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 4px;
            letter-spacing: 1px;
            transition: background 0.2s, transform 0.1s;
        }

        .back-btn:hover {
            background: rgba(255, 136, 0, 0.3);
            transform: scale(1.05);
        }

        .back-btn:active {
            transform: scale(0.96);
        }

        @keyframes pulse {
            from {
                text-shadow: 0 0 30px #ff4400;
            }

            to {
                text-shadow: 0 0 60px #ff8800, 0 0 100px #ff4400;
            }
        }
    </style>
</head>

<body>
    <div class="title">GOODBYE, SOLDIER</div>
    <div class="subtitle">Terima kasih sudah bermain City Shooter</div>
    <button class="back-btn" onclick="window.location.href='index.html'">▶ KEMBALI KE MENU</button>
</body>

</html>
